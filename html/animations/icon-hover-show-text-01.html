<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trapdoor Button</title>

    <style>
      @font-face {
        font-family: "tweet";
        src: url("https://s3-us-west-2.amazonaws.com/s.cdpn.io/277/tweet.woff")
          format("woff");
        font-weight: normal;
        font-style: normal;
      }

      .trapdoor {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200px;
        height: 50px;
        margin: -25px 0 0 -100px;
        background: black;
        box-shadow:
          inset -7px 0 12px -8px rgba(0, 0, 0, 0.3),
          inset 7px 0 12px -8px rgba(0, 0, 0, 0.3);
        transform: translateZ(0);
        -webkit-font-smoothing: antialiased;
        transition: background 400ms ease-in-out;
      }

      .trapdoor:hover {
        background: white;
      }

      .trapdoor:hover .door {
        transform: scale(1.08);
        box-shadow: 0 0 10px -2px rgba(0, 0, 0, 0.4);
      }

      .trapdoor:hover .top {
        top: -50%;
      }

      .trapdoor:hover .bottom {
        top: 100%;
      }

      .door {
        position: absolute;
        width: 100%;
        height: 50%;
        background-color: #fff;
        z-index: 2;
        overflow: hidden;

        transition:
          top 400ms ease-in-out,
          box-shadow 200ms ease-in-out,
          transform 300ms ease-in-out;
      }

      .door::before {
        content: "\e000";
        font-family: "tweet", sans-serif;
        position: absolute;
        left: 52%;
        margin-left: -20px;
        font-size: 35px;
        height: 20px;
        width: 0;
        color: #4099ff;
        display: block;
      }

      .top {
        top: 0;
        left: 0;
      }

      .top::before {
        top: 5px;
      }

      .bottom {
        top: 50%;
        left: 0;
      }

      .bottom::before {
        top: -20px;
      }

      .twitter-follow-button {
        position: absolute !important;
        top: 50%;
        left: 50%;
        margin: -14px 0 0 -77px;
      }
    </style>
  </head>

  <body>
    <div class="trapdoor">
      <div class="top door"></div>
      <div class="bottom door"></div>
      <a
        href="https://www.facebook.com/hoai.lam.754656/"
        class="twitter-follow-button"
        data-show-count="false"
        data-size="large"
        data-dnt="false"
      >
        FaceBook: Lý Hoài Lâm
      </a>
    </div>

    <script>
      (function (d, s, id) {
        if (d.getElementById(id)) return;
        const js = d.createElement(s);
        js.id = id;
        js.src = "https://platform.twitter.com/widgets.js";
        const fjs = d.getElementsByTagName(s)[0];
        fjs.parentNode.insertBefore(js, fjs);
      })(document, "script", "wittter-wjs");
    </script>
  </body>
</html>
