<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Interactive Background Gallery</title>
        <link rel="stylesheet" href="../../css/select-background.css" />
    </head>

    <body>
        <div class="main-background" id="mainBackground"></div>
        <div class="background-text" id="backgroundText"></div>

        <div class="container">
            <h1>dYZ" Background Gallery</h1>

            <div class="gallery" id="gallery">
            <!-- Images will be dynamically added here -->
            </div>

            <div class="controls">
                <div class="info">
                    <div class="current-bg show" id="currentBg">Click any image to set as background</div>
                </div>
            </div>
        </div>
        <script src="../../javascript/select-background.js"></script>
    </body>
</html>
