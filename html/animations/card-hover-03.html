<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hover-Zoom01</title>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Give+You+Glory&family=Instrument+Serif:ital@0;1&family=Playball&family=Playwrite+VN:wght@100..400&display=swap" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

        <link rel="stylesheet" href="../../css/card-hover-03.css">
        
    </head>
    <body>
        <h1 class="title">Great thief</h1>
        
        <section class="cards">
            <article class="card card--1">
                <div class="card__img"></div>
                <div class="card__img--hover"></div>
                <div class="card__info">
                <span class="card__category"> Forest</span>
                <h3 class="card__title">The Big Tree and the Darkness</h3>
                <span class="card__by">by <a href="#" class="card__author">Vo Danh 1</a></span>
                </div>
            </article>
            
            <article class="card card--2">
                <div class="card__img"></div>
                <div class="card__img--hover"></div>
                <div class="card__info">
                <span class="card__category"> Mountain</span>
                <h3 class="card__title">The majestic mountains</h3>
                <span class="card__by">by <a href="#" class="card__author">Vo Danh 2</a></span>
                </div>
            </article>    
        </section>
    </body>
</html>
